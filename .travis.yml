language: elixir
elixir:
- "1.7.4"
- "1.8.2"
- "1.9.4"
- "1.10.4"
- "1.11.1"
otp_release:
- "21.0"
- "22.0"
jobs:
  include:
    - elixir: "1.10.4"
      otp_release: "23.0"
    - elixir: "1.11.1"
      otp_release: "23.0"
before_install:
